<div class="bg-[#FFFFFF] min-h-screen p-4 sm:p-6 lg:p-0">
  <!-- <div class="p-4 sm:p-6">
    <p-breadcrumb 
      [model]="breadcrumbItems"  
      [styleClass]="'custom-breadcrumb mb-1'">
    </p-breadcrumb>
  </div> -->

  <div class="bg-white overflow-hidden">
    <div class="flex items-center justify-between p-3 sm:p-3 border-b border-gray-200">
      <h2 class="text-base font-semibold text-gray-800">  
        <p-breadcrumb 
      [model]="breadcrumbItems"  
      [styleClass]="'custom-breadcrumb mb-1'">
    </p-breadcrumb></h2>
      <div class="flex items-center space-x-2">
        <p-button 
          (click)="showDialog('add', [])" 
          label="Add" 
          icon="pi pi-plus" 
          variant="text" 
          [raised]="true"
          styleClass="orange-button" />
      </div>
    </div>

    <app-table-template 
      [data]="data" 
      [columns]="columns" 
      [pageSize]="pageSize"
      [totalCount]="totalCount"
      [isLoading]="isLoading"
      [currentPage]="pageNo"
      (pageChange)="onPageChange($event)"
      [actionTemplate]="actionTemplateRef"
      (searchChange)="onSearchChange($event)"
      (pageSizeChange)="onPageSizeChange($event)">
    </app-table-template>

    <ng-template #actionTemplateRef let-item>
      <button type="button" class="text-gray-400 hover:text-gray-600 cursor-pointer" (click)="op.toggle($event)">
        <i class="pi pi-ellipsis-v cursor-pointer"></i>
      </button>
      <p-popover #op>
        <div class="flex flex-col">
          <button (click)="showDialog('view', item); op.hide()" pTooltip="View"
            class="px-4 py-2 hover:bg-gray-100 text-left">
            <i class="pi pi-eye"></i>
          </button>
          <button (click)="showDialog('update', item); op.hide()" pTooltip="Update"
            class="px-4 py-2 hover:bg-gray-100 text-left">
            <i class="pi pi-pencil"></i>
          </button>
        </div>
      </p-popover>
    </ng-template>
  </div>

  <!-- Drawer for Add/Edit -->
  <p-drawer [(visible)]="visible" position="right" [modal]="true" [style]="{ width: '40%' }" (onHide)="onDrawerHide()">
    <ng-template pTemplate="header">
      <div class="flex items-center gap-2">
        <span class="font-semibold text-2xl">{{ header }}</span>
        <i class="text-blue-500" [ngClass]="headerIcon"></i>
      </div>
    </ng-template>

    <ng-template pTemplate="content">
      @if(isFormLoading){
        <div class="flex items-center justify-center min-h-[300px]">
          <p-progress-spinner strokeWidth="8" fill="transparent" animationDuration=".5s"
            [style]="{ width: '50px', height: '50px' }" />
        </div>
      }@else {
        <form [formGroup]="holidayForm" (ngSubmit)="onSubmit($event)" class="grid grid-cols-1 gap-4">
          <div class="card flex flex-col w-full">
            <label class="text-lg font-medium text-gray-700">Holiday Name*</label>
            <input 
              type="text" 
              pInputText 
              placeholder="Enter holiday name"
              formControlName="holidayName"
              [class.p-invalid]="isInvalid('holidayName')" />
            @if(isInvalid('holidayName')) {
              <small class="text-red-500 text-xs mt-1">Holiday name is required.</small>
            }
          </div>
        </form>
      }
    </ng-template>

    <ng-template pTemplate="footer">
      <div class="flex justify-end space-x-3 pt-4 border-t-2 border-gray-300 mt-4">
        <!-- FIX: Improved button visibility logic -->
        @if (postType === 'add' || postType === 'update') {
          <button 
            pButton 
            type="submit" 
            (click)="onSubmit($event)" 
            class="px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg shadow transition">
            {{ postType === 'add' ? 'Submit' : 'Update' }}
          </button>

          @if (postType === 'add') {
            <button 
              pButton 
              label="Reset" 
              (click)="onClear()" 
              class="px-6 py-2 bg-gray-200 hover:bg-gray-300 text-gray-800 rounded-lg shadow transition">
            </button>
          }
        }
        
        <!-- Add Close button for view mode -->
        @if (postType === 'view') {
          <button 
            pButton 
            label="Close" 
            (click)="onDrawerHide()" 
            class="px-6 py-2 bg-gray-200 hover:bg-gray-300 text-gray-800 rounded-lg shadow transition">
          </button>
        }
      </div>
    </ng-template>
  </p-drawer>

  <p-confirmdialog></p-confirmdialog>
  <p-toast></p-toast>
</div>
