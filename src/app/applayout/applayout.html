<div class="w-full h-screen flex bg-white overflow-hidden">
  <!-- Sidebar -->
  <app-sidebar [isSidebarOpen]="isSidebarOpen()" (toggleSidebar)="toggleSidebar()" class="fixed md:static inset-y-0 left-0 z-40 w-64 md:w-auto bg-white transition-transform duration-300
           transform md:translate-x-0"
    [ngClass]="{ '-translate-x-full': !isSidebarOpen(), 'translate-x-0': isSidebarOpen() }"></app-sidebar>
  <!-- Overlay for mobile -->
  @if (isSidebarOpen()) {
  <div class="fixed inset-0 bg-black/40 z-30 md:hidden" (click)="toggleSidebar()"></div>
  }
  <!-- Main content area -->




  <div class="w-full h-screen flex bg-white overflow-hidden">
    <div class="flex-1 flex flex-col h-screen transition-all duration-300 **overflow-x-hidden**" [ngClass]="{
      'md:ml-64': isSidebarOpen(),
      'md:ml-16': !isSidebarOpen(),
      'ml-0': true
    }">

      <app-header [isSidebarOpen]="isSidebarOpen()" (toggleSidebar)="toggleSidebar()"
        class="sticky top-0 z-40"></app-header>

      <main class="flex-1 overflow-y-auto bg-[#F1F5F9]">
        <router-outlet></router-outlet>
      </main>

      <footer class="bg-white border-t border-gray-200 text-gray-600 text-sm py-3 px-4 md:px-6 shadow-sm">
      <div class="flex flex-col sm:flex-row justify-between items-center gap-2 text-center sm:text-left">
        <span>© 2025 Nobilitas Infotech Pvt. Ltd.</span>
        <span class="text-blue-600 hover:underline cursor-pointer">
          Privacy · Terms
        </span>
      </div>
    </footer> 

    </div>
  </div>

  <!-- Global Toast and Confirm Dialog -->
  <p-confirmdialog></p-confirmdialog>
  <p-toast position="top-right"></p-toast>
</div>
