<div class="w-full min-h-screen bg-gray-50 px-4 md:px-8 lg:px-16 py-8">
  <h2 class="text-2xl font-bold text-gray-800 text-center mb-6">
    Raise Ticket
  </h2>

  <!-- Loading state -->
  <div *ngIf="isLoading" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
    <div
      *ngFor="let _ of [1, 2, 3, 4, 5, 6]"
      class="rounded-xl bg-white border border-gray-200 p-4 animate-pulse flex items-center justify-between"
    >
      <div class="space-y-2 w-full">
        <div class="h-3 bg-gray-200 rounded w-3/4"></div>
        <div class="h-3 bg-gray-200 rounded w-1/2"></div>
      </div>
      <div class="w-10 h-10 rounded-lg bg-gray-200"></div>
    </div>
  </div>

  <!-- No data -->
  <div *ngIf="!isLoading && noDatafoundCard" class="text-center text-gray-500 mt-8 text-sm">
    No categories found.
  </div>

  <!-- Category cards -->
  <div *ngIf="!isLoading && !noDatafoundCard" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
    <div
      *ngFor="let item of tabsData"
      (click)="onSelectCategory(item)"
      class="cursor-pointer rounded-xl bg-white border border-gray-200 hover:shadow-md hover:-translate-y-1 transition-all duration-200 p-4 flex items-center justify-between"
    >
      <!-- Text -->
      <div>
        <div class="text-base font-semibold text-gray-800">
          {{ item.drpOption }}
        </div>
      </div>

      <!-- Icon Last (Right Side) -->
      <div
        class="w-10 h-10 rounded-lg flex items-center justify-center shadow-sm"
        [ngStyle]="{ backgroundColor: item.backgroundColor }"
      >
        <i class="pi pi-ticket text-lg" [ngStyle]="{ color: item.color }"></i>
      </div>
    </div>
  </div>
</div>
