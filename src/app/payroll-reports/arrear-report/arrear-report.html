<div class="bg-[#FFFFFF] min-h-screen p-4 sm:p-6 lg:p-0">

    <!-- ================= BREADCRUMB + HEADER ================= -->
    <div class="bg-white overflow-hidden">
        <div class="flex items-center justify-between p-3 sm:p-3 border-b border-gray-200">
            <h2 class="text-base font-semibold text-gray-800">
                <p-breadcrumb [model]="breadcrumbItems"></p-breadcrumb>
            </h2>
            <div class="flex items-center space-x-2">
                <p-button (click)="showDialog()" label="Search Arrear Report" icon="pi pi-search"
                    styleClass="orange-button" [raised]="true"></p-button>
            </div>
        </div>

        <!-- ================= VIEW TABLE ================= -->
        <app-table-template [data]="tblData" [columns]="tableHeaders" [pageSize]="pageSize" [totalCount]="totalCount"
            [isLoading]="loading" [currentPage]="pageNo">

            <ng-template #rowTemplate let-row let-columns="columns">
                <tr class="hover:bg-gray-50 transition-colors duration-200">
                    <td *ngFor="let col of columns" class="p-3 text-sm text-gray-700 whitespace-nowrap">
                        {{ row[col.key] }}
                    </td>
                </tr>
            </ng-template>

        </app-table-template>

        <!-- EMPTY STATE handled by table template or here if template doesn't support it fully for empty data with specific message -->
        <div *ngIf="noDatafoundCard && !loading" class="p-10 text-center text-gray-500">
            <i class="pi pi-inbox text-5xl text-gray-300 mb-3"></i>
            <p class="text-sm">No data found for selected filters</p>
        </div>

    </div>

    <!-- ================= DRAWER (SEARCH) ================= -->
    <p-drawer [(visible)]="visible" position="right" [modal]="true" [baseZIndex]="10000"
        [style]="{ width: getDrawerWidth(), 'max-width': '100%', 'overflow-y': 'auto' }" (onHide)="onDrawerHide()">

        <!-- HEADER -->
        <ng-template pTemplate="header">
            <div class="flex items-center justify-between w-full gap-3 min-w-0">
                <div class="flex items-center gap-2">
                    <span class="font-semibold text-2xl">{{ header }}</span>
                    <i class="text-blue-500" [ngClass]="headerIcon"></i>
                </div>
                <!-- Maximize Button -->
                <div class="flex items-center gap-2 shrink-0">
                    <button type="button" (click)="toggleMaximize()"
                        class="p-2 hover:bg-gray-100 rounded transition-colors"
                        [title]="isMaximized ? 'Minimize' : 'Maximize'">
                        <i [ngClass]="isMaximized ? 'pi pi-window-minimize' : 'pi pi-window-maximize'"
                            class="text-gray-600 text-lg"></i>
                    </button>
                </div>
            </div>
        </ng-template>

        <!-- CONTENT -->
        <ng-template pTemplate="content">
            <form #arrearForm="ngForm" (ngSubmit)="searchReport(arrearForm)" class="flex flex-col gap-6 p-4">

                <!-- ================= SEARCH FILTERS ================= -->
                <div class="bg-white rounded-lg border border-gray-200">
                    <div class="bg-gradient-to-r from-indigo-50 to-blue-50 px-5 py-3 border-b border-gray-200">
                        <h4 class="text-base font-semibold text-gray-800 flex items-center gap-2">
                            <i class="pi pi-filter text-indigo-600"></i> Search Filters
                        </h4>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-5">

                        <!-- Organisation -->
                        <div class="input-type">
                            <label class="block mb-2 font-medium text-gray-700">Organisation <span
                                    class="text-red-500">*</span></label>
                            <p-select name="organization" [(ngModel)]="organization" #org="ngModel"
                                [options]="OrganisationData" (onChange)="onChangeOrg()" appendTo="body"
                                optionLabel="drpOption" optionValue="drpValue" placeholder="Select Organisation"
                                [filter]="true" [showClear]="true" class="w-full" required>
                            </p-select>

                            <small class="text-red-500" *ngIf="org.invalid && org.touched">
                                Organisation is required
                            </small>
                        </div>

                        <!-- Employee -->
                        <div class="input-type">
                            <label class="block mb-2 font-medium text-gray-700">Employee</label>
                            <p-select name="employee" [(ngModel)]="employee" #emp="ngModel" [options]="EmployeeData"
                                appendTo="body" optionLabel="drpOption" optionValue="drpValue"
                                placeholder="Select Employee" [filter]="true" [showClear]="true" class="w-full">
                            </p-select>
                        </div>

                        <!-- Month -->
                        <div class="input-type">
                            <label class="block mb-2 font-medium text-gray-700">Month <span
                                    class="text-red-500">*</span></label>
                            <p-select name="month" [(ngModel)]="month" #mon="ngModel" [options]="monthDrpData"
                                optionLabel="drpOption" appendTo="body" optionValue="drpValue"
                                placeholder="Select Month" [filter]="true" [showClear]="true" class="w-full" required>
                            </p-select>

                            <small class="text-red-500" *ngIf="mon.invalid && mon.touched">
                                Month is required
                            </small>
                        </div>

                        <!-- Year -->
                        <div class="input-type">
                            <label class="block mb-2 font-medium text-gray-700">Year <span
                                    class="text-red-500">*</span></label>
                            <p-select name="year" [(ngModel)]="year" #yr="ngModel" [options]="yearDrpData"
                                optionLabel="drpOption" optionValue="drpValue" placeholder="Select Year" [filter]="true"
                                [showClear]="true" class="w-full" appendTo="body" required>
                            </p-select>

                            <small class="text-red-500" *ngIf="yr.invalid && yr.touched">
                                Year is required
                            </small>
                        </div>

                    </div>
                </div>

                <!-- ================= FORM BUTTONS ================= -->
                <div class="flex justify-end gap-3 mt-4">
                    <p-button label="Reset" severity="secondary" icon="pi pi-refresh" type="button"
                        (click)="resetForm(arrearForm)">
                    </p-button>

                    <p-button label="Close" severity="secondary" icon="pi pi-times" type="button"
                        (click)="onDrawerHide()">
                    </p-button>

                    <p-button label="Search" icon="pi pi-search" type="submit" styleClass="orange-button"
                        [loading]="loading">
                    </p-button>
                </div>

            </form>
        </ng-template>
    </p-drawer>

</div>
