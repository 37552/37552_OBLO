<div class="bg-gray-50 min-h-screen p-6 space-y-6">

    <div class="flex justify-between items-center">
        <div>
            <h1 class="text-xl font-semibold">Dashboard</h1>
            <span class="block w-25 h-1 bg-blue-500 mx-auto rounded"></span>

        </div>
    </div>


    <h2 class="text-center text-lg sm:text-xl md:text-2xl font-bold text-gray-800" style="margin-top: 1%">
        Attendance
    </h2>

    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">

        <div *ngFor="let item of attendanceData; let i = index" class="ai-card" [style.animationDelay]="i * 0.1 + 's'">
            <div class="ai-bg" [ngStyle]="{'--clr': item.colorCode}"></div>
            <div class="ai-icon">
                <i [class]="getIcon(item.key)" [ngStyle]="{'color': item.colorCode}">
                </i>
            </div>
            <h2 class="ai-count" [ngStyle]="{'color': item.colorCode}">
                {{ item.cnt }}
            </h2>
            <p class="ai-label">{{ item.key }}</p>

        </div>

    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4" style="margin-top: 4%;">

        <!-- PIE -->
        <div class="bg-white p-3 sm:p-4 rounded-xl shadow 
                    h-[280px] sm:h-[320px] md:h-[350px]">

            <h3 class="text-center text-base sm:text-lg md:text-xl 
                     font-bold text-gray-700 mb-2">
                Statistics
            </h3>

            <canvas baseChart [data]="{ labels: pieChartLabels, datasets: pieChartDatasets }" [type]="pieChartType"
                [options]="pieChartOptions">
            </canvas>

        </div>

        <!-- BAR -->
        <div class="bg-white p-3 sm:p-4 rounded-xl shadow 
                    h-[280px] sm:h-[320px] md:h-[350px]">

            <h3 class="text-center text-base sm:text-lg md:text-xl 
                     font-bold text-gray-700 mb-2">
                On Time / Late Swipe In
            </h3>

            <canvas baseChart [data]="{ labels: barChartLabels, datasets: barChartData }" [type]="barChartType"
                [options]="barChartOptions">
            </canvas>

        </div>

    </div>


    <div class="mt-4" style="margin-top: 5%;">

        <h2 class="text-center text-lg sm:text-xl md:text-2xl font-bold text-gray-800" style="margin-top: 2%">
            Attendance Source
            <span class="block w-20 h-1 bg-blue-500 mx-auto mt-2 rounded"></span>
        </h2>

        <!-- DATA -->
        <div class="flex flex-wrap justify-center gap-5 sm:gap-7" style="margin-top: 1%">
            <div *ngFor="let item of attendanceSourceData" class="flex items-center gap-3 px-4 py-3 rounded-lg 
                      transition-all duration-300 hover:bg-gray-100 hover:shadow-sm">

                <!-- COLOR DOT -->
                <span class="w-4 h-4 rounded-full" [style.background]="item.colorCode"></span>

                <!-- LABEL -->
                <span class="text-sm sm:text-base md:text-lg text-gray-600">
                    {{item.key}} :
                </span>

                <!-- VALUE -->
                <span class="text-base sm:text-lg md:text-xl font-semibold text-gray-800">
                    {{item.cnt}}
                </span>

                <!-- PERCENT -->
                <span class="text-sm sm:text-base text-gray-500">
                    ({{getPercentage(item.cnt)}}%)
                </span>

            </div>
        </div>

    </div>


    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mt-6" style="margin-top: 4%;margin-bottom: 2%;">

        <div class="bg-white rounded-xl 
                    shadow-[0_6px_20px_rgba(0,0,0,0.15)] 
                    p-4 
                    h-[300px] sm:h-[340px] md:h-[360px]">

            <h2 class="text-center text-lg sm:text-xl font-semibold mb-2" style="margin-top: 15px;margin-bottom: 20px;">
                Exceptions
            </h2>

            <div class="relative h-[70%]">

                <canvas baseChart [data]="{ labels: exceptionChartLabels, datasets: exceptionChartData }"
                    [type]="exceptionChartType" [options]="exceptionChartOptions">
                </canvas>

                <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                    <div class="text-center">
                        <p class="text-xs text-gray-500">Total</p>
                        <h3 class="text-lg font-bold">{{totalException}}</h3>
                    </div>
                </div>

            </div>


        </div>

        <div class="bg-white rounded-xl 
                    shadow-[0_6px_20px_rgba(0,0,0,0.15)] 
                    p-4 
                    h-[300px] sm:h-[340px] md:h-[360px]">

            <h2 class="text-center text-lg sm:text-xl font-semibold mb-2" style="margin-top: 15px;margin-bottom: 20px;">
                Pending Request
            </h2>

            <div class="relative h-[70%]">

                <canvas baseChart [data]="{ labels: pendingChartLabels, datasets: pendingChartData }"
                    [type]="pendingChartType" [options]="pendingChartOptions">
                </canvas>

                <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                    <div class="text-center">
                        <p class="text-xs text-gray-500">Total</p>
                        <h3 class="text-lg font-bold">{{totalPending}}</h3>
                    </div>
                </div>

            </div>



        </div>

    </div>



</div>
