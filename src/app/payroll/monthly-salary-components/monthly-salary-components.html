<div class="bg-[#FFFFFF] min-h-screen p-4 sm:p-6 lg:p-0">

    <div class="bg-white overflow-hidden">
        <div class="flex items-center justify-between p-3 border-b border-gray-200">
            <h2 class="text-base font-semibold text-gray-800">
                <p-breadcrumb [model]="breadcrumbItems"></p-breadcrumb>
            </h2>

            <div class="flex items-center space-x-2">
                <p-button (click)="showDialog('add')" label="Add Salary Component" icon="pi pi-plus"
                    styleClass="orange-button" [raised]="true"></p-button>
            </div>
        </div>
    </div>

    <!-- TABLE -->
    <div style="display: flex;" class="mt-4">
        <div>
            <app-table-template [columns]="columns" [data]="viewData" [totalCount]="totalCount" [pageSize]="pageSize"
                [isLoading]="isLoading" [currentPage]="pageNo" [actionTemplate]="actionTemplateRef"
                (pageChange)="onPageChange($event)" (refresh)="getViewData(true)"
                (pageSizeChange)="onPageSizeChange($event)" (searchChange)="onSearchChange($event)">

                <ng-template #actionTemplateRef let-item let-i="rowIndex">
                    <button type="button" class="text-gray-600 hover:text-gray-900 cursor-pointer p-button-text"
                        (click)="op.toggle($event)">
                        <i class="pi pi-ellipsis-v text-xl" title="Actions"></i>
                    </button>

                    <p-popover #op>
                        <div class="flex flex-col">
                            <button (click)="showDialog('update', item); op.hide()" title="Update"
                                class="px-4 py-2 hover:bg-gray-100 text-left">
                                <span title="Update">
                                    <i class="pi pi-pencil"></i> Update
                                </span>
                            </button>
                            <button (click)="deleteItem(item, $event); op.hide()" title="Delete"
                                class="px-4 py-2 hover:bg-gray-100 text-left">
                                <i class="pi pi-trash" title="Delete"></i> Delete
                            </button>
                        </div>
                    </p-popover>
                </ng-template>
            </app-table-template>
        </div>
    </div>

    <!-- DRAWER -->
    <p-drawer [(visible)]="visible" position="right" [modal]="true" [style]="{ width: '60%', 'max-width': '100%' }"
        (onHide)="onDrawerHide()">

        <!-- HEADER -->
        <ng-template pTemplate="header">
            <div class="flex items-center gap-2">
                <span class="font-semibold text-2xl">{{ header }}</span>
                <i class="text-blue-500" [ngClass]="headerIcon"></i>
            </div>
        </ng-template>

        <!-- CONTENT -->
        <ng-template pTemplate="content">
            <form [formGroup]="salaryComponent" (ngSubmit)="onSubmit()" class="flex flex-col gap-6 p-4">

                <div class="bg-white rounded-lg border border-gray-200">
                    <div class="bg-gradient-to-r from-indigo-50 to-blue-50 px-5 py-3 border-b border-gray-200">
                        <h4 class="text-base font-semibold text-gray-800 flex items-center gap-2">
                            <i class="pi pi-info-circle text-indigo-600"></i> Component Details
                        </h4>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-5">

                        <!-- Salary Structure -->
                        <div>
                            <label class="block mb-1 font-medium">Salary Structure *</label>
                            <p-select formControlName="salaryStructureId"
                                class="form-select w-full border border-gray-300 rounded p-2"
                                [ngClass]="{'border-red-500': f['salaryStructureId'].invalid && (f['salaryStructureId'].dirty || f['salaryStructureId'].touched)}">
                                <option value="">Select salary structure</option>
                                <option *ngFor="let option of salaryStructureDrp" [value]="option.drpValue">{{
                                    option.drpOption }}</option>
                            </p-select>
                            <div class="text-red-500 text-sm"
                                *ngIf="f['salaryStructureId'].errors?.['required'] && (f['salaryStructureId'].dirty || f['salaryStructureId'].touched)">
                                Salary structure is required
                            </div>
                        </div>

                        <!-- Name -->
                        <div>
                            <label class="block mb-1 font-medium">Name *</label>
                            <input type="text" formControlName="name"
                                class="form-input w-full border border-gray-300 rounded p-2"
                                [ngClass]="{'border-red-500': f['name'].invalid && (f['name'].dirty || f['name'].touched)}" />
                            <div class="text-red-500 text-sm"
                                *ngIf="f['name'].errors?.['required'] && (f['name'].dirty || f['name'].touched)">
                                Name is required
                            </div>
                        </div>

                        <!-- Calculation On -->
                        <div>
                            <label class="block mb-1 font-medium">Calculation On</label>
                            <p-select formControlName="calculationOnBasic"
                                class="form-select w-full border border-gray-300 rounded p-2">
                                <option value="">Select calculation on basic</option>
                                <option *ngFor="let option of calculationOnBasicDrp" [value]="option.drpValue">{{
                                    option.drpOption }}</option>
                            </p-select>
                        </div>

                        <!-- Percentage -->
                        <div>
                            <label class="block mb-1 font-medium">Percentage</label>
                            <input type="text" formControlName="percentageValue"
                                class="form-input w-full border border-gray-300 rounded p-2"
                                [ngClass]="{'border-red-500': f['percentageValue'].invalid && (f['percentageValue'].dirty || f['percentageValue'].touched)}" />
                            <div class="text-red-500 text-sm" *ngIf="f['percentageValue'].errors?.['pattern']">
                                Percentage value must be a number
                            </div>
                        </div>

                        <!-- Calculation Rate -->
                        <div>
                            <label class="block mb-1 font-medium">Calculation Rate *</label>
                            <select formControlName="calculatioRate"
                                class="form-select w-full border border-gray-300 rounded p-2"
                                [ngClass]="{'border-red-500': f['calculatioRate'].invalid && (f['calculatioRate'].dirty || f['calculatioRate'].touched)}">
                                <option value="">Select calculation rate</option>
                                <option *ngFor="let option of calculatedOnDrp" [value]="option.drpValue">{{
                                    option.drpOption }}</option>
                            </select>
                            <div class="text-red-500 text-sm" *ngIf="f['calculatioRate'].errors?.['required']">
                                Calculation rate is required
                            </div>
                        </div>

                        <!-- Effective From -->
                        <div>
                            <label class="block mb-1 font-medium">Effective From</label>
                            <p-date-picker formControlName="effectiveFrom" styleClass="w-full" [showIcon]="true">
                            </p-date-picker>
                        </div>


                        <!-- PF -->
                        <div class="flex items-center gap-2 mt-2">
                            <input type="checkbox" formControlName="isPf" class="h-4 w-4" />
                            <label>PF</label>
                        </div>

                        <!-- ESIC -->
                        <div class="flex items-center gap-2 mt-2">
                            <input type="checkbox" formControlName="isEsic" class="h-4 w-4" />
                            <label>ESIC</label>
                        </div>

                    </div>
                </div>

                <div class="flex justify-end gap-3 mt-4">
                    <p-button label="Reset" severity="secondary" icon="pi pi-refresh" type="button"
                        (click)="salaryComponent.reset()" *ngIf="postType === 'add'"></p-button>

                    <p-button [label]="postType === 'update' ? 'Update' : 'Submit'" icon="pi pi-check" type="submit"
                        severity="success" [loading]="isLoading"></p-button>

                    <p-button label="Close" severity="secondary" icon="pi pi-times" type="button"
                        (click)="onDrawerHide()"></p-button>
                </div>

            </form>
        </ng-template>

    </p-drawer>

    <!-- TOAST & CONFIRM -->
    <p-toast></p-toast>
    <p-confirmDialog></p-confirmDialog>

</div>
