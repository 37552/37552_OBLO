<div class="bg-[#FFFFFF] min-h-screen p-4 sm:p-6 lg:p-0">

    <div class="bg-white overflow-hidden">
        <div class="flex items-center justify-between p-3 border-b border-gray-200">
            <h2 class="text-base font-semibold text-gray-800">
                <p-breadcrumb [model]="breadcrumbItems"></p-breadcrumb>
            </h2>

            <div class="flex items-center space-x-2">
                <p-button label="Add {{ FormName }}" icon="pi pi-plus" styleClass="orange-button" [raised]="true"
                    (click)="showDialog()">
                </p-button>
            </div>
        </div>
    </div>



    <p-drawer [(visible)]="visible" position="right" [modal]="true" [style]="{ width: drawerSize }"
        (onHide)="onDrawerHide()">

        <ng-template pTemplate="header">
            <div class="flex items-center gap-2">
                <span class="font-semibold text-xl">{{ header }}</span>
                <i class="text-blue-500" [ngClass]="headerIcon"></i>
            </div>
        </ng-template>

        <form class="p-4" [formGroup]="fnfSettlementForm " (ngSubmit)="onSubmitCall()">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="">Employee</label>
                    <p-select formControlName="employee" [options]="empDrp" optionLabel="drpOption"
                        optionValue="drpValue" placeholder="Select Employee" [filter]="true" class="w-full">
                    </p-select>
                </div>
                <div>
                    <label for="">Emp Code</label>
                    <input pInputText formControlName="empCode" placeholder="Enter Emp Code" class="w-full" />
                </div>

            </div>

        </form>
        <div class="flex justify-end mt-4 gap-3">
            <p-button label="Close" icon="pi pi-times" styleClass="p-button-outlined"
                (click)="onDrawerHide()"></p-button>
            <p-button label="Reset" icon="pi pi-refresh" styleClass="p-button-outlined"
                (click)="onDrawerHide()"></p-button>

            <p-button label="Submit" icon="pi pi-check" styleClass="orange-button"></p-button>
        </div>
    </p-drawer>



</div>
