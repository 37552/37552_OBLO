<div class="bg-[#FFFFFF] min-h-screen p-4 sm:p-6 lg:p-0">

    <!-- Breadcrumb + Title -->
    <div class="bg-white  overflow-hidden">
        <div class="flex items-center justify-between p-3 sm:p-3 border-b border-gray-200">
            <h2 class="text-base font-semibold text-gray-800">
                <p-breadcrumb [model]="breadcrumbItems"></p-breadcrumb>
            </h2>
            <div class="flex items-center space-x-2">
                <p-button (click)="showDialog('add')" label="Add Salary Component" icon="pi pi-plus"
                    styleClass="orange-button" [raised]="true"></p-button>
            </div>
        </div>

        <app-table-template [data]="viewData" [columns]="columns" [pageSize]="pageSize" [totalCount]="totalCount"
            [isLoading]="isLoading" [currentPage]="pageNo" (pageChange)="onPageChange($event)"
            (refresh)="getViewData(true)" (searchChange)="onSearchChange($event)"
            (pageSizeChange)="onPageSizeChange($event)" [actionTemplate]="actionTemplateRef">

            <ng-template #actionTemplateRef let-item let-i="rowIndex">
                <button type="button" class="text-gray-600 hover:text-gray-900 cursor-pointer p-button-text"
                    (click)="op.toggle($event)">
                    <i class="pi pi-ellipsis-v text-xl"></i>
                </button>

                <p-popover #op>
                    <div class="flex flex-col">


                        <button (click)="showDialog('update', item); op.hide()" title="Edit"
                            class="px-4 py-2 hover:bg-gray-100 text-left">
                            <span>
                                <i class="pi pi-pencil"></i> Edit
                            </span>
                        </button>

                        <button (click)="deleteItem(item, $event); op.hide()" title="Delete"
                            class="px-4 py-2 hover:bg-gray-100 text-left">
                            <i class="pi pi-trash"></i> Delete
                        </button>

                    </div>
                </p-popover>
            </ng-template>

        </app-table-template>
    </div>

    <!-- Add / Update Form Drawer -->
    <p-drawer [(visible)]="visible" position="right" [modal]="true"
        [style]="{ width: '50%', 'max-width': '100%', 'overflow-y': 'auto' }" (onHide)="onDrawerHide()">

        <ng-template pTemplate="header">
            <div class="flex items-center gap-2">
                <span class="font-semibold text-2xl">{{ header }}</span>
                <i class="text-blue-500" [ngClass]="headerIcon"></i>
            </div>
        </ng-template>

        <ng-template pTemplate="content">
            <form [formGroup]="salaryComponent" (ngSubmit)="onSubmit()" class="flex flex-col gap-6 p-4">

                <div class="bg-white rounded-lg border border-gray-200">
                    <div class="bg-gradient-to-r from-indigo-50 to-blue-50 px-5 py-3 border-b border-gray-200">
                        <h4 class="text-base font-semibold text-gray-800 flex items-center gap-2">
                            <i class="pi pi-info-circle text-indigo-600"></i> Component Details
                        </h4>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 p-5">

                        <!-- Salary Structure -->
                        <div>
                            <label class="block mb-1 font-medium">Salary Structure <span
                                    class="text-red-500">*</span></label>
                            <p-select [options]="salaryStructureDrp" optionLabel="drpOption" optionValue="drpValue"
                                formControlName="salaryStructureId" placeholder="Select salary structure"
                                [filter]="true" [showClear]="true" class="w-full"
                                [class.p-invalid]="f['salaryStructureId'].invalid && (f['salaryStructureId'].dirty || f['salaryStructureId'].touched)"></p-select>
                            <div class="text-red-500 text-sm"
                                *ngIf="f['salaryStructureId'].errors?.['required'] && (f['salaryStructureId'].dirty || f['salaryStructureId'].touched)">
                                Salary structure is required
                            </div>
                        </div>

                        <!-- Name -->
                        <div>
                            <label class="block mb-1 font-medium">Name <span class="text-red-500">*</span></label>
                            <input pInputText type="text" formControlName="name" class="w-full"
                                [class.p-invalid]="f['name'].invalid && (f['name'].dirty || f['name'].touched)" />
                            <div class="text-red-500 text-sm"
                                *ngIf="f['name'].errors?.['required'] && (f['name'].dirty || f['name'].touched)">
                                Name is required
                            </div>
                        </div>

                        <!-- Calculation On -->
                        <div>
                            <label class="block mb-1 font-medium">Calculation On</label>
                            <p-select [options]="calculationOnBasicDrp" optionLabel="drpOption" optionValue="drpValue"
                                formControlName="calculationOnBasic" placeholder="Select calculation on basic"
                                [filter]="true" [showClear]="true" class="w-full"></p-select>
                        </div>

                        <!-- Percentage -->
                        <div>
                            <label class="block mb-1 font-medium">Percentage</label>
                            <input pInputText type="text" formControlName="percentageValue" class="w-full"
                                [class.p-invalid]="f['percentageValue'].invalid && (f['percentageValue'].dirty || f['percentageValue'].touched)" />
                            <div class="text-red-500 text-sm" *ngIf="f['percentageValue'].errors?.['pattern']">
                                Percentage value must be a number
                            </div>
                        </div>

                        <!-- Calculation Rate -->
                        <div>
                            <label class="block mb-1 font-medium">Calculation Rate <span
                                    class="text-red-500">*</span></label>
                            <p-select [options]="calculatedOnDrp" optionLabel="drpOption" optionValue="drpValue"
                                formControlName="calculationRate" placeholder="Select calculation rate" [filter]="true"
                                [showClear]="true" class="w-full"
                                [class.p-invalid]="f['calculationRate'].invalid && (f['calculationRate'].dirty || f['calculationRate'].touched)"></p-select>
                            <div class="text-red-500 text-sm"
                                *ngIf="f['calculationRate'].errors?.['required'] && (f['calculationRate'].dirty || f['calculationRate'].touched)">
                                Calculation Rate is required
                            </div>
                        </div>

                        <!-- Effective From -->
                        <div>
                            <label class="block mb-1 font-medium">Effective From</label>
                            <p-date-picker formControlName="effectiveFrom" styleClass="w-full" [showIcon]="true">
                            </p-date-picker>
                        </div>

                        <!-- PF -->
                        <div class="flex items-center gap-2 mt-2">
                            <label for="isPf">PF</label>
                            <p-checkbox formControlName="isPf" [binary]="true" label="PF">PF </p-checkbox>
                        </div>

                        <!-- ESIC -->
                        <div class="flex items-center gap-2 mt-2">
                            <label for="isEsic">ESIC</label>
                            <p-checkbox formControlName="isEsic" [binary]="true" label="ESIC">ESIC </p-checkbox>
                        </div>

                    </div>
                </div>

                <div class="flex justify-end gap-3 mt-4">
                    <p-button label="Reset" severity="secondary" icon="pi pi-refresh" type="button"
                        (click)="salaryComponent.reset()" *ngIf="postType === 'add'"></p-button>

                    <p-button [label]="postType === 'update' ? 'Update' : 'Submit'" icon="pi pi-check" type="submit"
                        severity="success" [loading]="isLoading"></p-button>

                    <p-button label="Close" severity="secondary" icon="pi pi-times" type="button"
                        (click)="onDrawerHide()"></p-button>
                </div>

            </form>
        </ng-template>
    </p-drawer>

    <p-confirmdialog></p-confirmdialog>
    <p-toast></p-toast>
</div>
