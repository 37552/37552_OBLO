<div class="bg-[#FFFFFF] min-h-screen p-4 sm:p-6 lg:p-0">
    <div class="bg-white overflow-hidden">
        <div class="flex items-center justify-between p-3 sm:p-3 border-b border-gray-200">
            <h2 class="text-base font-semibold text-gray-800">Account Settings</h2>
            <div class="flex items-center space-x-2">
                <p-button (click)="showDialog('add', [])" label="Add" icon="pi pi-plus" variant="text" [raised]="true"
                    styleClass="orange-button"></p-button>
            </div>
        </div>

        <app-table-template [data]="data" [columns]="columns" [pageSize]="pageSize" [totalCount]="totalCount"
            [isLoading]="isLoading" [currentPage]="pageNo" [sortColumn]="sortColumn" [sortDirection]="sortDirection"
            [searchText]="searchText" [actionTemplate]="actionTemplateRef" (pageChange)="onPageChange($event)"
            (searchChange)="onSearchChange($event)" (sortChange)="onSortChange($event)"
            (pageSizeChange)="onPageSizeChange($event)"></app-table-template>

        <ng-template #actionTemplateRef let-item>
            <button type="button" class="text-gray-400 hover:text-gray-600 cursor-pointer" (click)="op.toggle($event)">
                <i class="pi pi-ellipsis-v cursor-pointer"></i>
            </button>
            <p-popover #op>
                <div class="flex flex-col">
                    <button (click)="showDialog('view', item); op.hide()" pTooltip="View"
                        class="px-4 py-2 hover:bg-gray-100 text-left">
                        <i class="pi pi-eye"></i>
                    </button>
                    <button (click)="showDialog('update', item); op.hide()" pTooltip="Update"
                        class="px-4 py-2 hover:bg-gray-100 text-left">
                        <i class="pi pi-pencil"></i>
                    </button>
                    <button (click)="deleteItem(item); op.hide()" class="px-4 py-2 hover:bg-gray-100 text-left"
                        pTooltip="Delete">
                        <i class="pi pi-trash"></i>
                    </button>
                </div>
            </p-popover>
        </ng-template>
    </div>

    
<p-drawer [(visible)]="visible" position="right" [modal]="true" (onHide)="onDrawerHide()"
    class="sm:w-[60%] w-full !max-w-full" [style]="{ width: '80%', 'max-width': '100%' }">

    <!-- Header -->
    <ng-template pTemplate="header">
        <div class="flex items-center gap-2">
            <span class="font-semibold text-2xl">{{ header }}</span>
            <i class="text-blue-500" [ngClass]="headerIcon"></i>
        </div>
    </ng-template>

    <!-- Content -->
    <ng-template pTemplate="content" [style]="{ padding: '2rem' }">
        <div *ngIf="isFormLoading" class="flex items-center justify-center min-h-[400px]">
            <p-progress-spinner strokeWidth="8" fill="transparent" animationDuration=".5s"
                [style]="{ width: '50px', height: '50px' }"></p-progress-spinner>
        </div>

        <div *ngIf="!isFormLoading">



            <!-- Card-----> 

           <p-card class="rounded-lg border border-gray-200 mb-6">
  <!-- Header -->
  <div class="flex justify-between items-center p-3 bg-gray-50 rounded-t-lg">
    <span class="font-semibold text-lg">Accounting & Transaction Settings</span>
  </div>

  <!-- FORM (Always Open) -->
  <form [formGroup]="accountingForm"
        class="flex flex-col gap-6 p-4">

    <!-- GRID -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">

      <!-- DROPDOWNS / INPUTS FIRST -->
<div class="flex flex-col">
  <label class="text-sm font-medium text-gray-700 mb-1">Book Deferred Entries based on</label>
  <p-select 
      [options]="deferredOptions" 
      optionValue="drpValue" 
      optionLabel="drpOption"
      formControlName="bookDeferredEntriesBasedOn"
      [class.border-red-500]="isInvalid('bookDeferredEntriesBasedOn', accountingForm)"
      class="w-full">
  </p-select>
  <p *ngIf="isInvalid('bookDeferredEntriesBasedOn', accountingForm)" class="text-red-500 text-xs mt-1">
    Required field.
  </p>
</div>

<div class="flex flex-col">
  <label class="text-sm font-medium text-gray-700 mb-1">Determine Address Tax Category From</label>
  <p-select 
      [options]="determineAddressTaxFrom"
      optionLabel="drpOption"
      optionValue="drpValue"
      formControlName="determineAddressTaxFrom"
      [class.border-red-500]="isInvalid('determineAddressTaxFrom', accountingForm)"
      class="w-full"
      placeholder="Select Option">
  </p-select>
  <p *ngIf="isInvalid('determineAddressTaxFrom', accountingForm)" class="text-red-500 text-xs mt-1">
    Required field.
  </p>
</div>

<div class="flex flex-col">
  <label class="text-sm font-medium text-gray-700 mb-1">
    Auto Reconcile Job Trigger (Interval 1–59 Minutes)
  </label>
  <input 
      pInputText 
      type="number" 
      formControlName="autoReconcileInterval"
      placeholder="Enter minutes"
      class="border rounded-md p-2"
      [class.border-red-500]="isInvalid('autoReconcileInterval', accountingForm)"
  />
  <p *ngIf="isInvalid('autoReconcileInterval', accountingForm)" class="text-red-500 text-xs mt-1">
    Required field.
  </p>
</div>

<div class="flex flex-col">
  <label class="text-sm font-medium text-gray-700 mb-1">Reconcile Queue Size</label>
  <input 
      pInputText 
      type="number" 
      formControlName="reconcileQueueSize"
      placeholder="Enter number"
      class="border rounded-md p-2"
      [class.border-red-500]="isInvalid('reconcileQueueSize', accountingForm)"
  />
  <p *ngIf="isInvalid('reconcileQueueSize', accountingForm)" class="text-red-500 text-xs mt-1">
    Required field.
  </p>
</div>

<div class="flex flex-col">
  <label class="text-sm font-medium text-gray-700 mb-1">
    Posting date inheritance for exchange gain loss
  </label>

  <p-select
      [options]="postingDateInheritanceOptions"
      optionLabel="drpOption"
      optionValue="drpValue"
      formControlName="postingDateInheritanceForGainLoss"
      [class.border-red-500]="isInvalid('postingDateInheritanceForGainLoss', accountingForm)"
      class="w-full"
      placeholder="Select Option">
  </p-select>
  <p *ngIf="isInvalid('postingDateInheritanceForGainLoss', accountingForm)" class="text-red-500 text-xs mt-1">
    Required field.
  </p>
</div>

      <!-- CHECKBOXES BELOW -->
      <label class="flex items-center gap-2 text-gray-800">
        <p-checkbox binary="true" formControlName="unlinkPaymentOnInvoiceCancel"></p-checkbox>
        Unlink Payment on Cancellation of Invoice
      </label>

      <label class="flex items-center gap-2 text-gray-800">
        <p-checkbox binary="true" formControlName="unlinkAdvanceOnOrderCancel"></p-checkbox>
        Unlink Advance Payment on Cancellation of Order
      </label>

      <label class="flex items-center gap-2 text-gray-800">
        <p-checkbox binary="true" formControlName="checkSupplierInvoiceUniqueness"></p-checkbox>
        Check Supplier Invoices Number Uniqueness
      </label>

      <label class="flex items-center gap-2 text-gray-800">
        <p-checkbox binary="true" formControlName="autoFetchPaymentTermsFromOrder"></p-checkbox>
        Automatically Fetch Payment Terms from Order
      </label>

      <label class="flex items-center gap-2 text-gray-800">
        <p-checkbox binary="true" formControlName="mergeSimilarAccountHeads"></p-checkbox>
        Merge Similar Accounts Heads
      </label>

      <label class="flex items-center gap-2 text-gray-800">
        <p-checkbox binary="true" formControlName="bookTaxLossEarlyPayment"></p-checkbox>
        Book Tax Loss on Early Payment Discount
      </label>

      <label class="flex items-center gap-2 text-gray-800">
        <p-checkbox binary="true" formControlName="showInclusiveTaxInPrint"></p-checkbox>
        Show Inclusive Tax in Print
      </label>

      <label class="flex items-center gap-2 text-gray-800">
        <p-checkbox binary="true" formControlName="showTaxAsTableInPrint"></p-checkbox>
        Show taxes as Table in Print
      </label>

      <label class="flex items-center gap-2 text-gray-800">
        <p-checkbox binary="true" formControlName="autoReconcilePayments"></p-checkbox>
        Auto Reconcile Payments
      </label>

      <label class="flex items-center gap-2 text-gray-800">
        <p-checkbox binary="true" formControlName="deleteLedgerEntriesOnDelete"></p-checkbox>
        Delete Accounting and Stock Ledger Entries on Deletion of Transactions
      </label>

      <label class="flex items-center gap-2 text-gray-800">
        <p-checkbox binary="true" formControlName="enableImmutableLedger"></p-checkbox>
        Enable Immutable Ledger
      </label>

      <label class="flex items-center gap-2 text-gray-800">
        <p-checkbox binary="true" formControlName="enableCommonPartyAccounting"></p-checkbox>
        Enable common party Accounting
      </label>

      <label class="flex items-center gap-2 text-gray-800">
        <p-checkbox binary="true" formControlName="allowMultiCurrencyInvoices"></p-checkbox>
        Allow multi currency invoices against single party account
      </label>

      <label class="flex items-center gap-2 text-gray-800">
        <p-checkbox binary="true" formControlName="autoProcessDeferredAccounting"></p-checkbox>
        Automatically processes deferred Accounting Entries
      </label>

      <label class="flex items-center gap-2 text-gray-800">
        <p-checkbox binary="true" formControlName="autoAddTaxesFromTemplate"></p-checkbox>
        Automatically Add taxes and charges from item tax template
      </label>

      <label class="flex items-center gap-2 text-gray-800">
        <p-checkbox binary="true" formControlName="roundTaxAmountRowWise"></p-checkbox>
        Round tax amount row wise
      </label>

      <label class="flex items-center gap-2 text-gray-800">
        <p-checkbox binary="true" formControlName="showPaymentScheduleInPrint"></p-checkbox>
        Show payment schedule in print
      </label>

      <label class="flex items-center gap-2 text-gray-800">
        <p-checkbox binary="true" formControlName="allowStateExchangeRates"></p-checkbox>
        Allow state exchange rates
      </label>

    </div>
  </form>
</p-card>


<!-- Credit Limits Card -->
<p-card class="rounded-lg border border-gray-200 mb-6">
  <div class="flex justify-between items-center p-3 bg-gray-50 rounded-t-lg">
    <span class="font-semibold text-lg">Credit Limits</span>
  </div>

  <form [formGroup]="creditLimitsForm" class="flex flex-col gap-6 p-4">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4 items-center">

      <!-- Over Billing Allowance -->
      <div class="flex flex-col">
        <label class="text-sm font-medium text-gray-700 mb-1">Over Billing Allowance (%)</label>
        <input 
          pInputText 
          type="number" 
          formControlName="overBillingAllowance"
          placeholder="Enter percentage"
          class="border rounded-md p-2"
          [class.border-red-500]="isInvalid('overBillingAllowance', creditLimitsForm)"
        />
        <p 
          *ngIf="isInvalid('overBillingAllowance', creditLimitsForm)" 
          class="text-red-500 text-xs mt-1"
        >
          Required field.
        </p>
      </div>

      <div></div>

      <!-- Role Allowed to Over Bill -->
      <div class="flex flex-col">
        <label class="text-sm font-medium text-gray-700 mb-1">Role Allowed to Over Bill</label>
        <p-select 
          [options]="roleAllowed" 
          optionLabel="drpOption" 
          optionValue="drpValue"
          formControlName="roleAllowedToOverBill"
          class="w-full"
          placeholder="Select role"
          [class.border-red-500]="isInvalid('roleAllowedToOverBill', creditLimitsForm)"
        >
        </p-select>
        <p 
          *ngIf="isInvalid('roleAllowedToOverBill', creditLimitsForm)" 
          class="text-red-500 text-xs mt-1"
        >
          Required field.
        </p>
      </div>

      <!-- Role Allowed to By-pass Limit -->
      <div class="flex flex-col">
        <label class="text-sm font-medium text-gray-700 mb-1">Role Allowed to By-pass Limit</label>
        <p-select 
          [options]="roleAllowed" 
          optionLabel="drpOption" 
          optionValue="drpValue"
          formControlName="roleAllowedToBypassLimit"
          class="w-full"
          placeholder="Select role"
          [class.border-red-500]="isInvalid('roleAllowedToBypassLimit', creditLimitsForm)"
        >
        </p-select>
        <p 
          *ngIf="isInvalid('roleAllowedToBypassLimit', creditLimitsForm)" 
          class="text-red-500 text-xs mt-1"
        >
          Required field.
        </p>
      </div>

    </div>
  </form>
</p-card>



<!-- Assets Card -->
<p-card class="rounded-lg border border-gray-200 mb-6">
  <div class="flex justify-between items-center p-3 bg-gray-50 rounded-t-lg">
    <span class="font-semibold text-lg">Assets</span>
  </div>

  <form [formGroup]="assetsForm" class="flex flex-col gap-6 p-4">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">

      <label class="flex items-center gap-2 text-gray-800">
        <p-checkbox binary="true" formControlName="calculateDailyDepreciation"></p-checkbox>
        Calculate daily depreciation using total days in depreciation period
      </label>

      <label class="flex items-center gap-2 text-gray-800">
        <p-checkbox binary="true" formControlName="bookAssetDepreciationAutomatically"></p-checkbox>
        Book Asset Depreciation Entry Automatically
      </label>

    </div>
  </form>
</p-card>


<p-card class="rounded-lg border border-gray-200 mb-6">

  <div class="flex justify-between items-center p-3 bg-gray-50 rounded-t-lg">
    <span class="font-semibold text-lg">Accounts Closing</span>
  </div>

  <form [formGroup]="accountsClosingForm"
        class="flex flex-col gap-6 p-4">

    <!-- DATE + DROPDOWN -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">

      <!-- LEFT -->
      <div class="flex flex-col w-full">
        <label class="text-sm font-medium text-gray-700 mb-1">Accounts Frozen Till Date</label>

        <p-datepicker
            formControlName="accountsFrozenTillDate"
            appendTo="body"
            [showIcon]="true"
            inputId="frozenDate"
            placeholder="Select Date"
            class="w-full"
            [ngClass]="{ 'border-red-500': isInvalid('accountsFrozenTillDate', accountsClosingForm) }"
            dateFormat="yy-mm-dd">
        </p-datepicker>

        <p *ngIf="isInvalid('accountsFrozenTillDate', accountsClosingForm)" 
           class="text-red-500 text-xs mt-1">
          Required field.
        </p>
      </div>

      <!-- RIGHT -->
      <div class="flex flex-col w-full">
        <label class="text-sm font-medium text-gray-700 mb-1">
          Role Allowed to Set Frozen Accounts and Edit Frozen Entries
        </label>

        <p-select 
          [options]="roleAllowed" 
          optionValue="drpValue" 
          optionLabel="drpOption"
          formControlName="roleAllowedToFreezeEdit"
          class="w-full"
          placeholder="Select Role"
          [class.border-red-500]="isInvalid('roleAllowedToFreezeEdit', accountsClosingForm)">
        </p-select>

        <p *ngIf="isInvalid('roleAllowedToFreezeEdit', accountsClosingForm)" 
           class="text-red-500 text-xs mt-1">
          Required field.
        </p>
      </div>

    </div>

    <!-- CHECKBOX (NO VALIDATION REQUIRED) -->
    <label class="flex items-center gap-2 text-gray-800">
      <p-checkbox binary="true" formControlName="ignoreAccountClosingBalance"></p-checkbox>
      Ignore Account Closing Balance
    </label>

  </form>
</p-card>


<p-card class="rounded-lg border border-gray-200 mb-6">

  <div class="flex justify-between items-center p-3 bg-gray-50 rounded-t-lg">
    <span class="font-semibold text-lg">Banking</span>
  </div>

  <form [formGroup]="bankingForm"
        class="flex flex-col gap-6 p-4">

    <label class="flex items-center gap-2 text-gray-800">
      <p-checkbox binary="true" formControlName="enableCommonPartyAcc"></p-checkbox>
      Enable common party accounting
    </label>

  </form>
</p-card>




        </div>
    </ng-template>

    <!-- Footer -->
    <ng-template pTemplate="footer">
        <div *ngIf="postType !== 'view'" class="flex justify-end space-x-3 pt-4 border-t-2 border-gray-300 mt-4">
            <button pButton type="submit" (click)="onSubmit($event)"
                class="px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg shadow transition">
                {{ postType === 'add' ? 'Submit' : 'Update' }}
            </button>
            <button *ngIf="postType === 'add'" pButton label="Reset" (click)="onClear()"
                class="px-6 py-2 bg-gray-200 hover:bg-gray-300 text-gray-800 rounded-lg shadow transition"></button>
        </div>
    </ng-template>
</p-drawer>

</div>
