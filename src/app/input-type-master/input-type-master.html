<div class="bg-[#FFFFFF] min-h-screen p-4 sm:p-6 lg:p-0">
    <div class="bg-white  overflow-hidden">
        <div class="flex items-center justify-between p-3 sm:p-3 border-b border-gray-200">
            <h2 class="text-base font-semibold text-gray-800">Input Type Master</h2>
            <div class="flex items-center space-x-2">
                <p-button (click)="showDialog('add', [])" label="Add" icon="pi pi-plus" variant="text"
                    class="cursor-pointer" [raised]="true" styleClass="orange-button" />
            </div>
        </div>

        <!-- Table -->
        <!-- *ngIf="!isLoading" -->
        <app-table-template [data]="data" [columns]="columns" [pageSize]="pageSize" [totalCount]="totalCount"
            [isLoading]="isLoading" [currentPage]="pageNo" [sortColumn]="sortColumn" [sortDirection]="sortDirection"
            [searchText]="searchText" [actionTemplate]="actionTemplateRef" (pageChange)="onPageChange($event)"
            (searchChange)="onSearchChange($event)" (sortChange)="onSortChange($event)"
            (pageSizeChange)="onPageSizeChange($event)">
        </app-table-template>

        <!-- Action Template -->
        <ng-template #actionTemplateRef let-item>
            <button type="button" class="text-gray-400 hover:text-gray-600 cursor-pointer" (click)="op.toggle($event)">
                <i class="pi pi-ellipsis-v cursor-pointer"></i>
            </button>
            <p-popover #op>
                <div class="flex flex-col">
                    <button (click)="showDialog('view', item); op.hide()" pTooltip="View"
                        class="px-4 py-2 hover:bg-gray-100 text-left">
                        <i class="pi pi-eye"></i>
                    </button>
                    <button (click)="showDialog('update', item); op.hide()" pTooltip="Update"
                        class="px-4 py-2 hover:bg-gray-100 text-left">
                        <i class="pi pi-pencil"></i>
                    </button>
                    <button (click)="deleteItem(item); op.hide()" class="px-4 py-2 hover:bg-gray-100 text-left"
                        pTooltip="Delete">
                        <i class="pi pi-trash"></i>
                    </button>
                </div>
            </p-popover>
        </ng-template>
    </div>

    <!-- Drawer -->
    <p-drawer [(visible)]="visible" position="right" [modal]="true" (onHide)="onDrawerHide()"
        class="sm:w-[60%] w-full !max-w-full" [style]="{ width: '60%', 'max-width': '100%' }">
        <ng-template pTemplate="header">
            <div class="flex items-center gap-2">
                <span class="font-semibold text-2xl">{{header}}</span>
                <i class="text-blue-500" [ngClass]="headerIcon"></i>
            </div>
        </ng-template>
        <ng-template pTemplate="content">
            <div *ngIf="isFormLoading" class="flex items-center justify-center min-h-[400px]">
                <p-progress-spinner strokeWidth="8" fill="transparent" animationDuration=".5s"
                    [style]="{ width: '50px', height: '50px' }" />
            </div>
            <form *ngIf="!isFormLoading" [formGroup]="inputTypeForm" (ngSubmit)="onSubmit($event)"
                class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Field Name*</label>
                    <input type="text" formControlName="fieldName" placeholder="Enter field name"
                        [class.border-red-500]="isInvalid('fieldName')"
                        class="w-full rounded-md text-base border-2 border-gray-300 px-3 py-1 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200" />
                    <p *ngIf="isInvalid('fieldName')" class="text-red-500 text-xs mt-1">Field name is required.</p>
                </div>
            </form>
        </ng-template>
        <ng-template pTemplate="footer">
            <div *ngIf="postType !== 'view'" class="flex justify-end space-x-3 pt-4 border-t-2 border-gray-300 mt-4">
                <button pButton type="submit" (click)="onSubmit($event)"
                    class="px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg shadow transition"
                    [disabled]="inputTypeForm.invalid">{{ postType === 'add' ? 'Submit' : 'Update' }}</button>
                <button *ngIf="postType === 'add'" pButton label="Reset" (click)="inputTypeForm.reset()"
                    class="px-6 py-2 bg-gray-200 hover:bg-gray-300 text-gray-800 rounded-lg shadow transition"></button>
            </div>
        </ng-template>
    </p-drawer>

    <p-confirmdialog></p-confirmdialog>
    <p-toast></p-toast>
</div>
